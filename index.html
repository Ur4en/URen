<!DOCTYPE html>
<html lang="zh-tw">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>氣泡排序法</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(to right, #4facfe, #00f2fe);
      color: #fff;
      text-align: center;
      padding: 20px;
    }

    #barContainer {
      display: flex;
      justify-content: center;
      align-items: flex-end;
      height: 300px;
      margin: 20px auto;
      border: 2px solid #fff;
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.1);
      overflow: hidden;
    }

    .bar {
      width: 30px;
      margin: 0 5px;
      background-color: #007bff;
      text-align: center;
      color: #fff;
      font-size: 14px;
      border-radius: 5px 5px 0 0;
      transition: height 0.5s, background-color 0.5s, transform 0.5s;
    }

    #controls {
      margin-top: 20px;
    }

    button {
      background-color: #007bff;
      color: #fff;
      border: none;
      padding: 10px 20px;
      margin: 5px;
      border-radius: 5px;
      cursor: pointer;
      transition: background-color 0.3s;
    }

    button:hover {
      background-color: #0056b3;
    }

    #description {
      margin-top: 20px;
      font-size: 18px;
    }

    .highlight {
      color: #ffeb3b;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <h1>冒泡排序視覺化</h1>
  <div id="barContainer"></div>
  <div id="controls">
    <button onclick="startSort()">開始排序</button>
    <button onclick="pauseSort()">暫停</button>
    <button onclick="resumeSort()">繼續</button>
    <button onclick="nextStep()">下一步</button>
    <button onclick="resetBars()">重置</button>
  </div>
  <div id="description"></div>

  <script>
    const barContainer = document.getElementById('barContainer');
    const description = document.getElementById('description');
    let bars = [];
    let arr = [];
    let i = 0, j = 0;
    let isPaused = false;
    let isStepMode = false;

    // 初始化條形圖
    function resetBars() {
      barContainer.innerHTML = '';
      arr = Array.from({ length: 10 }, () => Math.floor(Math.random() * 20) + 1);
      bars = arr.map(value => {
        const bar = document.createElement('div');
        bar.className = 'bar';
        bar.style.height = `${value * 10}px`;
        bar.textContent = value;
        barContainer.appendChild(bar);
        return bar;
      });
      i = 0;
      j = 0;
      isPaused = false;
      isStepMode = false;
      description.textContent = '';
    }

    // 條形圖交換動畫
    async function swapBars(index1, index2) {
      const bar1 = bars[index1];
      const bar2 = bars[index2];

      // 動畫效果：交換位置
      bar1.style.transform = `translateX(${(index2 - index1) * 35}px)`;
      bar2.style.transform = `translateX(${(index1 - index2) * 35}px)`;

      await new Promise(resolve => setTimeout(resolve, 500)); // 等待動畫完成

      // 交換數據
      [arr[index1], arr[index2]] = [arr[index2], arr[index1]];
      bar1.style.transform = 'translateX(0)';
      bar2.style.transform = 'translateX(0)';

      // 更新高度和文字
      bar1.style.height = `${arr[index1] * 10}px`;
      bar1.textContent = arr[index1];
      bar2.style.height = `${arr[index2] * 10}px`;
      bar2.textContent = arr[index2];
    }

    // 冒泡排序的單步執行
    async function bubbleSortStep() {
      if (i < arr.length - 1) {
        if (j < arr.length - i - 1) {
          // 比較兩個數字
          bars[j].style.backgroundColor = 'red';
          bars[j + 1].style.backgroundColor = 'red';
          description.innerHTML = `比較 <span class="highlight">${arr[j]}</span> 和 <span class="highlight">${arr[j + 1]}</span>`;

          await new Promise(resolve => setTimeout(resolve, 500));

          if (arr[j] > arr[j + 1]) {
            // 交換數字
            description.innerHTML = `<span class="highlight">${arr[j]}</span> 比 <span class="highlight">${arr[j + 1]}</span> 大，交換位置。`;
            await swapBars(j, j + 1);
          } else {
            description.innerHTML = `<span class="highlight">${arr[j]}</span> 比 <span class="highlight">${arr[j + 1]}</span> 小，不交換。`;
          }

          bars[j].style.backgroundColor = '#007bff';
          bars[j + 1].style.backgroundColor = '#007bff';
          j++;
        } else {
          j = 0;
          i++;
        }
      } else {
        // 排序完成
        Array.from(bars).forEach(bar => bar.style.backgroundColor = 'gold');
        description.textContent = '排序完成！結果為：' + arr.join(', ');
        return;
      }

      if (!isPaused && !isStepMode) {
        bubbleSortStep();
      }
    }

    // 開始排序
    function startSort() {
      isPaused = false;
      isStepMode = false;
      bubbleSortStep();
    }

    // 暫停排序
    function pauseSort() {
      isPaused = true;
    }

    // 繼續排序
    function resumeSort() {
      if (isPaused) {
        isPaused = false;
        bubbleSortStep();
      }
    }

    // 下一步
    function nextStep() {
      isStepMode = true;
      if (i < arr.length - 1) {
        bubbleSortStep();
      }
    }

    // 初始化條形圖
    resetBars();
  </script>
</body>
</html>
